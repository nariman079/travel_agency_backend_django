apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-agency
  namespace: default 
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: travel-agency
  template:
    metadata:
      labels:
        app: travel-agency
    spec: 
      containers:
        - name: django
          image: nariman079i/travel-agency-ethno:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 8000
          volumeMounts:
          - name: travel-data            
            mountPath: /app/median
          command: ['/bin/sh', '-c']
          args:
          - |
            python manage.py migrate && 
            python manage.py collectstatic --noinput &&
            uvicorn config.asgi:application --host 0.0.0.0 --port 8000
      volumes:                           
      - name: travel-data                
        persistentVolumeClaim:
          claimName: travel-data-pvc     