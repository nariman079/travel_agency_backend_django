apiVersion: apps/v1
kind: Deployment
metadata: 
  name: travel-agency
  namespace: default 

spec: 
  replicas: 1
  selector:
    matchLabels:
      app: travel-agency
  template:
    metadata:
      labels:
        app: travel-agency
    spec: 
      containers:
        - name: django
          image: nariman079i/travel-agency-backend:latest
          ports:
          - containerPort: 8000
          envFrom:
          - secretRef:
              name: travel-db-secrets
          volumeMounts:
          - name: travel-data
            mountPath: /app/media
          command: ['/bin/sh', '-c']
          args:
          - python manage.py migrate && 
            python manage.py collectstatic --noinput &&
            uvicorn config.asgi:application --host 0.0.0.0 --port 8000